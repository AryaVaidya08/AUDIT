<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>

    <section>
        <h2>User Management</h2>
        <input id="user-search" type="text" placeholder="Search users...">
        <button onclick="searchUsers()">Search</button>
        <table>
            <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Password Hash</th><th>Actions</th></tr></thead>
            <tbody id="users-table-body"></tbody>
        </table>
    </section>

    <section>
        <h2>Run Maintenance Script</h2>
        <input id="script-name" type="text" placeholder="Script filename">
        <input id="script-args" type="text" placeholder="Arguments">
        <button onclick="runMaintenanceScript(document.getElementById('script-name').value)">Run</button>
        <pre id="script-output"></pre>
    </section>

    <section>
        <h2>Database Query</h2>
        <textarea id="raw-query" rows="4" cols="60" placeholder="Enter SQL query..."></textarea>
        <button onclick="executeQuery()">Execute</button>
        <pre id="query-results"></pre>
    </section>

    <section>
        <h2>System Logs</h2>
        <input id="log-date" type="text" placeholder="Date (YYYY-MM-DD)">
        <button onclick="fetchLogs()">Fetch Logs</button>
        <div id="log-output"></div>
    </section>

    <section id="main-content"></section>

    <script src="/admin.js"></script>
    <script>
        function executeQuery() {
            const sql = document.getElementById('raw-query').value;
            fetch('/admin/raw-query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            }).then(r => r.json()).then(data => {
                document.getElementById('query-results').textContent = JSON.stringify(data, null, 2);
            });
        }

        function fetchLogs() {
            const date = document.getElementById('log-date').value;
            fetch('/logs?date=' + date)
                .then(r => r.text())
                .then(html => {
                    document.getElementById('log-output').innerHTML = html;
                });
        }
    </script>
</body>
</html>
